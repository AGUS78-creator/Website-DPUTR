<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>LIKE DPUTR</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>LAYANAN INFORMASI KEPEGAWAIAN (LIKE)</h1>
</header>

<nav>
  <a href="#" onclick="toggleMenu()">Beranda</a>
  <a href="login.html">Login</a>
</nav>

<main>
  <h2>Selamat Datang</h2>
  <p>Silakan pilih menu layanan.</p>
</main>

<!-- MENU -->
<section id="menuLayanan" style="display:none;">
  <h3>Menu Layanan</h3>

  <a href="struktur.html">Struktur Organisasi</a><br><br>

  <a href="#" onclick="cekLogin('pensiun.html')">Data Pensiun</a><br>
  <a href="#" onclick="cekLogin('kgb.html')">Data KGB</a><br>
  <a href="#" onclick="cekLogin('kp.html')">Data KP</a><br>
  <a href="#" onclick="cekLogin('pegawai.html')">Data Pegawai</a><br>
</section>

<script>
function toggleMenu() {
  let m = document.getElementById("menuLayanan");
  m.style.display = (m.style.display === "block") ? "none" : "block";
}

function cekLogin(tujuan) {
  if (localStorage.getItem("isLoggedIn") === "true") {
    window.location.href = tujuan;
  } else {
    alert("Harus login dulu!");
    window.location.href = "login.html";
  }
}
</script>

</body>
</html>
