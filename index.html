<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>LIKE DPUTR</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>LAYANAN INFORMASI KEPEGAWAIAN (LIKE)</h1>
</header>

<nav>
  <a href="#" onclick="toggleMenu()">Beranda</a>
  <a href="login.html">Login</a>
</nav>

<main>
  <h2>Selamat Datang</h2>
  <p>Silakan pilih menu layanan.</p>
</main>

<!-- MENU BERANDA -->
<section id="menuLayanan" class="menu-beranda">
  <h3>Menu Layanan</h3>

  <div class="grid-menu">

    <a href="struktur.html" class="card-menu">
      Struktur Organisasi
    </a>

    <a href="#" onclick="cekLogin('pensiun.html')" class="card-menu">
      Data Pensiun
    </a>

    <a href="#" onclick="cekLogin('kgb.html')" class="card-menu">
      Data KGB
    </a>

    <a href="#" onclick="cekLogin('kp.html')" class="card-menu">
      Data KP
    </a>

    <a href="#" onclick="cekLogin('pegawai.html')" class="card-menu">
      Data Pegawai
    </a>

  </div>
</section>

<script>
function toggleMenu() {
  let menu = document.getElementById("menuLayanan");

  if (menu.style.display === "block") {
    menu.style.display = "none";
  } else {
    menu.style.display = "block";
  }
}

function cekLogin(tujuan) {
  if (localStorage.getItem("isLoggedIn") === "true") {
    window.location.href = tujuan;
  } else {
    alert("Silakan login terlebih dahulu!");
    window.location.href = "login.html";
  }
}
</script>

</body>
</html>
</script>

</body>
</html>
