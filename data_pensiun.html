<!DOCTYPE html>
<html lang="id">
<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Data Pensiun</title>

  <link rel="stylesheet"
        href="style.css">

</head>

<body>

<!-- HEADER -->
<header class="hero">

  <div class="hero-content">

    <div class="hero-logo">

      <img src="logo-pemda.png"
           class="logo-header">

      <div class="hero-title">

        <h1>DATA PENSIUN</h1>

        <p>
          LIKE DPUTR Kabupaten Purwakarta
        </p>

      </div>

      <img src="logo-pu.png"
           class="logo-header">

    </div>

  </div>

</header>

<!-- NAVBAR -->
<nav class="navbar">

  <a href="index.html">
    Beranda
  </a>

</nav>

<!-- CONTENT -->
<main class="container">

  <section class="menu-beranda">

    <h3>
      Daftar Pegawai Pensiun
    </h3>

    <div style="overflow-x:auto;">

      <table border="1"
             id="tabel"
             style="
             border-collapse:collapse;
             width:100%;
             background:white;
             color:black;
             ">

      </table>

    </div>

  </section>

</main>

<!-- FOOTER -->
<footer>

  <p>
    © 2026 LIKE DPUTR Kabupaten Purwakarta
  </p>

  <small>
    Created by Agus Hilman, S.I.P
    <br>
    (Analis SDM Aparatur Ahli Pertama)
  </small>

</footer>

<script>

fetch(
"https://docs.google.com/spreadsheets/d/1DN8DSlTnZE5T570QZR492bc4U6YKOFtD47SPgGNZ0cU/export?format=csv&gid=511537472"
)

.then(res => res.text())

.then(data => {

  let rows = data.split("\n");

  let tabel =
  document.getElementById("tabel");

  rows.forEach((row, index) => {

    let tr =
    document.createElement("tr");

    row.split(",").forEach(col => {

      let cell;

      if(index == 0){

        cell =
        document.createElement("th");

        cell.style.background =
        "#0d47a1";

        cell.style.color =
        "white";

      } else {

        cell =
        document.createElement("td");
      }

      cell.innerText = col;

      cell.style.padding = "10px";

      tr.appendChild(cell);

    });

    tabel.appendChild(tr);

  });

});

</script>

</body>
</html>
