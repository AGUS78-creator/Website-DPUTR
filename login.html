<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login LIKE DPUTR</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="halaman-login">

  <div class="login-box">
    <img src="logo-pu.png" alt="Logo PU">

    <h2>Login Sistem Kepegawaian</h2>

    <p class="sub-login">
      LIKE DPUTR Kabupaten Purwakarta
    </p>

    <input type="text" id="username" placeholder="Masukkan NIP / Username" />
    <input type="password" id="password" placeholder="Masukkan Password" />

    <button onclick="login()">Masuk</button>

    <p id="error"></p>

    <a href="index.html" class="btn-kembali">
      ← Kembali ke Beranda
    </a>
  </div>

  <footer>
    <p>© 2026 LIKE DPUTR Kabupaten Purwakarta</p>
    <small>
      Created by Agus Hilman, S.I.P
      <br>
      (Analis SDM Aparatur Ahli Pertama)
    </small>
  </footer>

<script>
const URL_SCRIPT =
  "https://script.google.com/macros/s/AKfycbyOwthnAL6F5DNGvcdSulFJiHcrokHKzNDBpNAsljj-EPrSPsIPqck4c-jeCRwBPuJu/exec";

function login() {
  const user = document.getElementById("username").value.trim();
  const pass = document.getElementById("password").value.trim();
  const errorBox = document.getElementById("error");

  if (!user || !pass) {
    errorBox.textContent = "Harap isi NIP dan Password.";
    return;
  }

  errorBox.textContent = "Memeriksa data login...";

  const callbackName = "callbackLogin";

  window[callbackName] = function(res) {
    if (res.status === "sukses") {
      localStorage.setItem("isLoggedIn", "true");
      localStorage.setItem("role", res.role);
      localStorage.setItem("nip", user);

      alert("Login berhasil!");
      window.location.href = "index.html";
    } else {
      errorBox.textContent = "Login gagal. NIP atau Password salah.";
    }
  };

  const script = document.createElement("script");

  script.src =
    URL_SCRIPT +
    "?nip=" + encodeURIComponent(user) +
    "&password=" + encodeURIComponent(pass) +
    "&callback=" + callbackName +
    "&t=" + new Date().getTime();

  document.body.appendChild(script);
}
</script>

</body>
</html>
